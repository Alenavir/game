syntax = "proto3";

package gameservice.game;

option java_package = "ru.alenavir.gameservice.grpc";
option java_outer_classname = "GameServiceProto";

// Состояние игры
enum GameState {
  WAITING = 0;   // Игра создана, ждёт игроков
  RUNNING = 1;   // Игра идёт
  FINISHED = 2;  // Игра завершена
}

// DTO игры
message GameInfo {
  int64 id = 1;
  GameState state = 2;
  repeated int64 player_ids = 3;
}

// создание игры
message CreateGameRequest {
  int64 player_id = 1; // Создатель матча
}

message CreateGameResponse {
  int64 game_id = 1;
}

// присоед. к игре
message JoinGameRequest {
  int64 player_id = 1;
  int64 game_id = 2;
}

message JoinGameResponse {
}

// покинуть игру
message LeaveGameRequest {
  int64 player_id = 1;
  int64 game_id = 2;
}

message LeaveGameResponse {
}

// начать игру
message StartGameRequest {
  int64 game_id = 1;
}

message StartGameResponse {
}

// получить инфу об игре
message GetGameRequest {
  int64 game_id = 1;
}

message GetGameResponse {
  GameInfo game = 1;
}

// Игра в активном состоянии
message IsGameRunningRequest {
  int64 game_id = 1;
}

message IsGameRunningResponse {
  bool exists = 1;
}

// gRPC сервис
service GameService {
  rpc CreateGame(CreateGameRequest) returns (CreateGameResponse);
  rpc JoinGame(JoinGameRequest) returns (JoinGameResponse);
  rpc LeaveGame(LeaveGameRequest) returns (LeaveGameResponse);
  rpc StartGame(StartGameRequest) returns (StartGameResponse);
  rpc GetGame(GetGameRequest) returns (GetGameResponse);
  rpc isGameRunning(IsGameRunningRequest) returns (IsGameRunningResponse);
}