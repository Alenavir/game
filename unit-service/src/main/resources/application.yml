spring:
  application:
    name: unit-service

  datasource:
    url: jdbc:h2:mem:game_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

grpc:
  server:
    port: 9093
