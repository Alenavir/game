syntax = "proto3";

package unitservice.unit;

option java_package = "ru.alenavir.unitservice.grpc";
option java_outer_classname = "UnitServiceProto";

// Тип юнита
enum UnitType {
  KNIGHT = 0;
  MAGICIAN = 1;
}

// DTO для юнита
message UnitInfo {
  int64 id = 1;
  UnitType type = 2;
  double x = 3;
  double y = 4;
  int64 player_id = 5;
  int64 game_id = 6;
  int32 health = 7;
}

// DTO для создания юнита
message CreateUnitRequest {
  UnitType type = 1;
  double x = 2;
  double y = 3;
  int64 player_id = 4;
  int64 game_id = 5;
}

message CreateUnitResponse {
  UnitInfo unit = 1;
}

// DTO для перемещения юнита
message MoveUnitRequest {
  int64 unit_id = 1;
  int64 player_id = 2;
  double x = 3;
  double y = 4;
}

message MoveUnitResponse {
  UnitInfo unit = 1;
}

// DTO для атаки юнита
message AttackUnitRequest {
  int64 attacker_id = 1;
  int64 target_id = 2;
  int64 player_id = 3; // игрок, который инициирует атаку
}

message AttackUnitResponse {
  UnitInfo attacker = 1; // атакующий юнит (для MVP не меняется, но возвращаем)
  UnitInfo target = 2;  // обновлённая цель (null, если юнит уничтожен)
  int32 damage = 3;
  bool target_dead = 4;
}

// gRPC сервис
service UnitService {
  rpc CreateUnit(CreateUnitRequest) returns (CreateUnitResponse);
  rpc MoveUnit(MoveUnitRequest) returns (MoveUnitResponse);
  rpc AttackUnit(AttackUnitRequest) returns (AttackUnitResponse); // новый метод
}