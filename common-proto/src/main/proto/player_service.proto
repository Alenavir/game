syntax = "proto3";

package playerservice.player;

option java_package = "ru.alenavir.playerservice.grpc";
option java_outer_classname = "PlayerServiceProto";

// DTO игрока
message PlayerInfo {
  int64 id = 1;
  string name = 2;
  int64 current_game_id = 3;
}

// создать игрока
message CreatePlayerRequest {
  string name = 1;
}

message CreatePlayerResponse {
  PlayerInfo player = 1;
}

// получить игрока
message GetPlayerInfoRequest {
  int64 player_id = 1;
}

message GetPlayerInfoResponse {
  PlayerInfo player = 1;
}

// существует ли игрок
message HasPlayerRequest {
  int64 player_id = 1;
}

message HasPlayerResponse {
  bool exists = 1;
}

// в игре ли игрок
message HasCurrentGameRequest {
  int64 player_id = 1;
}

message HasCurrentGameResponse {
  bool exists = 1;
}

// gRPC сервис
service PlayerService {
  rpc CreatePlayer(CreatePlayerRequest) returns (CreatePlayerResponse);
  rpc GetPlayerInfo(GetPlayerInfoRequest) returns (GetPlayerInfoResponse);
  rpc HasPlayer(HasPlayerRequest) returns (HasPlayerResponse);
  rpc HasCurrentGame(HasCurrentGameRequest) returns (HasCurrentGameResponse);
}